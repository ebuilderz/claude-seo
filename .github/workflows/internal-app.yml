name: Internal audit app

on:
  pull_request:
    paths:
      - "internal-app/**"
      - ".github/workflows/internal-app.yml"
  push:
    branches: [main]
    paths:
      - "internal-app/**"
      - ".github/workflows/internal-app.yml"

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internal-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal-app/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm test
