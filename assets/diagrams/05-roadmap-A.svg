<text x="1288.0" y="240" class="label-tiny" text-anchor="middle">patch generation</text>
<text x="1288.0" y="256" class="label-tiny" text-anchor="middle">web-vitals lab</text>
<path d="M 1288.0 300 L 1288.0 275" class="conn-soft"/>
<circle cx="1580.0" cy="310" r="10" fill="#4F7B6E" stroke="#0A0807" stroke-width="2"/>
<rect x="1440.0" y="335.0" width="280" height="130" rx="4" class="box"></rect>
<text x="1580.0" y="385.0" class="label-accent" text-anchor="middle">v3.0.0 · q4 2026</text>
