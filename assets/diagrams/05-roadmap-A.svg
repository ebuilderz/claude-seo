<text x="412.0" y="430" class="label-tiny" text-anchor="middle">moz · bing · common-crawl</text>
<text x="412.0" y="446" class="label-tiny" text-anchor="middle">3-tier cascade</text>
<path d="M 412.0 320 L 412.0 335" class="conn-soft"/>
<circle cx="704.0" cy="310" r="10" fill="#4F7B6E" stroke="#0A0807" stroke-width="2"/>
<rect x="564.0" y="145.0" width="280" height="130" rx="4" class="box"></rect>
<text x="704.0" y="195.0" class="label-accent" text-anchor="middle">v1.9.0 · apr 2026</text>
