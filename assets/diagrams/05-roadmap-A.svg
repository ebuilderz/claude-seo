  <line x1="0" y1="48" x2="1700" y2="48" stroke="#a89968" stroke-width="1"/>
  <text x="20" y="29.0" font-family="JetBrains Mono, monospace" font-size="15" fill="#3D3933" font-weight="600">claude-seo.app — 05 · roadmap · A</text>
  <!-- Traffic lights (right-aligned) -->
  <circle cx="1616"   cy="24.0" r="9" fill="#fbbf24" stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1644"   cy="24.0" r="9" fill="#10b981"  stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1672" cy="24.0" r="9" fill="#ef4444"    stroke="#a89968" stroke-width="0.7"/>

