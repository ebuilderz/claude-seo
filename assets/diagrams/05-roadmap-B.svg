<path d="M 438.0 940.0 L 370.0 940.0" class="conn-soft"/>
<circle cx="450.0" cy="1150.0" r="12" fill="#4F7B6E" stroke="#0A0807" stroke-width="2"/>
<rect x="530.0" y="1095.0" width="360" height="110" rx="4" class="box"></rect>
<text x="710.0" y="1145.0" class="label-accent" text-anchor="middle">v3.0.0 · q4 2026</text>
<text x="710.0" y="1165.0" class="label" text-anchor="middle">audit-as-code</text>
