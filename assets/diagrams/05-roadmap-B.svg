<rect x="10.0" y="465.0" width="360" height="110" rx="4" class="box"></rect>
<text x="190.0" y="515.0" class="label-accent" text-anchor="middle">v1.9.0 · apr 2026</text>
<text x="190.0" y="535.0" class="label" text-anchor="middle">community challenge</text>
<text x="190.0" y="590.0" class="label-tiny" text-anchor="middle">cluster · sxo · drift</text>
