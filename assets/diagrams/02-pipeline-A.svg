<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 528"
     preserveAspectRatio="xMidYMid meet" width="100%" font-family="JetBrains Mono, monospace">
<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
    .bg            { fill: #16130F; }
    .bg-soft       { fill: #1A1612; }
    .box           { fill: #1E1B16; stroke: #3A332C; stroke-width: 1; }
    .box-focal     { fill: #232019; stroke: #4F7B6E; stroke-width: 1.4; }
    .box-future    { fill: #1A1612; stroke: #2F2A24; stroke-width: 1; stroke-dasharray: 4 3; }
    .box-soft      { fill: #1C1915; stroke: #2F2A24; stroke-width: 1; }
    .label-h       { font-family: 'JetBrains Mono', monospace; fill: #F0EDE5; font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .label         { font-family: 'JetBrains Mono', monospace; fill: #F0EDE5; font-size: 14px; font-weight: 600; }
    .label-sub     { font-family: 'JetBrains Mono', monospace; fill: #8FA89E; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; }
    .label-tiny    { font-family: 'JetBrains Mono', monospace; fill: #6A8077; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .label-radial  { font-family: 'JetBrains Mono', monospace; fill: #D8E5DE; font-size: 13px; font-weight: 600; letter-spacing: 0.6px; }
    .label-accent  { font-family: 'JetBrains Mono', monospace; fill: #8BC0A8; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .label-inter   { font-family: 'Inter', system-ui, sans-serif; fill: #F0EDE5; font-size: 14px; font-weight: 500; }
    .conn          { stroke: #6A8077; stroke-width: 1; fill: none; }
    .conn-soft     { stroke: #3A615A; stroke-width: 1; fill: none; }
    .conn-dashed   { stroke: #3A615A; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    .accent-fill   { fill: #4F7B6E; }
    .accent-bright { fill: #8BC0A8; }
    .corner-mark   { font-family: 'JetBrains Mono', monospace; fill: #5F7770; font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; }
  ]]></style>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6A8077"/>
  </marker>
  <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#3A615A"/>
  </marker>
</defs>
<!-- Window outer border + bg -->
<rect x="0.5" y="0.5" width="1599" height="527" rx="10" fill="#FFFFFF" stroke="#a89968" stroke-width="1"/>

  <!-- OS window title bar -->
  <path d="M 0 10 Q 0 0 10 0 L 1590 0 Q 1600 0 1600 10 L 1600 48 L 0 48 Z" fill="#f5f1e8"/>
  <line x1="0" y1="48" x2="1600" y2="48" stroke="#a89968" stroke-width="1"/>
  <text x="20" y="29.0" font-family="JetBrains Mono, monospace" font-size="15" fill="#3D3933" font-weight="600">claude-seo.app — 02 · audit pipeline · A</text>
  <!-- Traffic lights (right-aligned) -->
  <circle cx="1516"   cy="24.0" r="9" fill="#fbbf24" stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1544"   cy="24.0" r="9" fill="#10b981"  stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1572" cy="24.0" r="9" fill="#ef4444"    stroke="#a89968" stroke-width="0.7"/>

<!-- Content area: dark canvas, shifted down by TITLE_H -->
<g transform="translate(0, 48)">
  <rect class="bg" width="1600" height="480"/>
  <rect x="83.33333333333331" y="175.0" width="220" height="130" rx="4" class="box-focal"><animate attributeName="opacity" values="0.85;1;0.85" dur="4.2s" repeatCount="indefinite"/></rect>
<text x="193.33333333333331" y="235.0" class="label-accent" text-anchor="middle">input</text>
<text x="193.33333333333331" y="255.0" class="label" text-anchor="middle">/seo audit</text>
<path d="M 307.3333333333333 240.0 L 382.66666666666663 240.0" class="conn" marker-end="url(#arrow)"/>
<rect x="386.66666666666663" y="175.0" width="220" height="130" rx="4" class="box"></rect>
<text x="496.66666666666663" y="225.0" class="label-accent" text-anchor="middle">detect</text>
<text x="496.66666666666663" y="245.0" class="label" text-anchor="middle">industry</text>
<text x="496.66666666666663" y="265.0" class="label" text-anchor="middle">+ tech stack</text>
<path d="M 610.6666666666666 240.0 L 686.0 240.0" class="conn" marker-end="url(#arrow)"/>
<rect x="690.0" y="175.0" width="220" height="130" rx="4" class="box"></rect>
<text x="800.0" y="225.0" class="label-accent" text-anchor="middle">dispatch</text>
<text x="800.0" y="245.0" class="label" text-anchor="middle">15 agents</text>
<text x="800.0" y="265.0" class="label" text-anchor="middle">in parallel</text>
<path d="M 914.0 240.0 L 989.3333333333335 240.0" class="conn" marker-end="url(#arrow)"/>
<rect x="993.3333333333335" y="175.0" width="220" height="130" rx="4" class="box"></rect>
<text x="1103.3333333333335" y="225.0" class="label-accent" text-anchor="middle">synthesize</text>
<text x="1103.3333333333335" y="245.0" class="label" text-anchor="middle">scores</text>
<text x="1103.3333333333335" y="265.0" class="label" text-anchor="middle">+ framework</text>
<path d="M 1217.3333333333335 240.0 L 1292.6666666666665 240.0" class="conn" marker-end="url(#arrow)"/>
<rect x="1296.6666666666665" y="175.0" width="220" height="130" rx="4" class="box"></rect>
<text x="1406.6666666666665" y="225.0" class="label-accent" text-anchor="middle">report</text>
<text x="1406.6666666666665" y="245.0" class="label" text-anchor="middle">score · plan</text>
<text x="1406.6666666666665" y="265.0" class="label" text-anchor="middle">· pdf</text>
  <text x="1580" y="468" class="corner-mark" text-anchor="end">02 · audit pipeline · A</text>
</g>
</svg>
