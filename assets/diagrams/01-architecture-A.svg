<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 998"
     preserveAspectRatio="xMidYMid meet" width="100%" font-family="JetBrains Mono, monospace">
<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
    .bg            { fill: #16130F; }
    .bg-soft       { fill: #1A1612; }
    .box           { fill: #1E1B16; stroke: #3A332C; stroke-width: 1; }
    .box-focal     { fill: #232019; stroke: #4F7B6E; stroke-width: 1.4; }
    .box-future    { fill: #1A1612; stroke: #2F2A24; stroke-width: 1; stroke-dasharray: 4 3; }
    .box-soft      { fill: #1C1915; stroke: #2F2A24; stroke-width: 1; }
    .label-h       { font-family: 'JetBrains Mono', monospace; fill: #F0EDE5; font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .label         { font-family: 'JetBrains Mono', monospace; fill: #F0EDE5; font-size: 14px; font-weight: 600; }
    .label-sub     { font-family: 'JetBrains Mono', monospace; fill: #8FA89E; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; }
    .label-tiny    { font-family: 'JetBrains Mono', monospace; fill: #6A8077; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .label-radial  { font-family: 'JetBrains Mono', monospace; fill: #D8E5DE; font-size: 13px; font-weight: 600; letter-spacing: 0.6px; }
    .label-accent  { font-family: 'JetBrains Mono', monospace; fill: #8BC0A8; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .label-inter   { font-family: 'Inter', system-ui, sans-serif; fill: #F0EDE5; font-size: 14px; font-weight: 500; }
    .conn          { stroke: #6A8077; stroke-width: 1; fill: none; }
    .conn-soft     { stroke: #3A615A; stroke-width: 1; fill: none; }
    .conn-dashed   { stroke: #3A615A; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    .accent-fill   { fill: #4F7B6E; }
    .accent-bright { fill: #8BC0A8; }
    .corner-mark   { font-family: 'JetBrains Mono', monospace; fill: #5F7770; font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; }
  ]]></style>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6A8077"/>
  </marker>
  <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#3A615A"/>
  </marker>
</defs>
<!-- Window outer border + bg -->
<rect x="0.5" y="0.5" width="1199" height="997" rx="10" fill="#FFFFFF" stroke="#a89968" stroke-width="1"/>

  <!-- OS window title bar -->
  <path d="M 0 10 Q 0 0 10 0 L 1190 0 Q 1200 0 1200 10 L 1200 48 L 0 48 Z" fill="#f5f1e8"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#a89968" stroke-width="1"/>
  <text x="20" y="29.0" font-family="JetBrains Mono, monospace" font-size="15" fill="#3D3933" font-weight="600">claude-seo.app — 01 · system architecture · A</text>
  <!-- Traffic lights (right-aligned) -->
  <circle cx="1116"   cy="24.0" r="9" fill="#fbbf24" stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1144"   cy="24.0" r="9" fill="#10b981"  stroke="#a89968" stroke-width="0.7"/>
  <circle cx="1172" cy="24.0" r="9" fill="#ef4444"    stroke="#a89968" stroke-width="0.7"/>

<!-- Content area: dark canvas, shifted down by TITLE_H -->
<g transform="translate(0, 48)">
  <rect class="bg" width="1200" height="950"/>
  <rect x="420.0" y="60.0" width="360" height="80" rx="4" class="box-focal"><animate attributeName="opacity" values="0.85;1;0.85" dur="4.2s" repeatCount="indefinite"/></rect>
<text x="600.0" y="95.0" class="label-accent" text-anchor="middle">entry</text>
<text x="600.0" y="115.0" class="label" text-anchor="middle">/seo audit</text>
<rect x="420.0" y="200.0" width="360" height="80" rx="4" class="box"></rect>
<text x="600.0" y="235.0" class="label-accent" text-anchor="middle">orchestrator</text>
<text x="600.0" y="255.0" class="label" text-anchor="middle">seo/SKILL.md</text>
<rect x="140.0" y="365.0" width="280" height="130" rx="4" class="box"></rect>
<text x="280" y="415.0" class="label-accent" text-anchor="middle">sub-skills</text>
<text x="280" y="435.0" class="label" text-anchor="middle">25 modules</text>
<text x="280" y="455.0" class="label" text-anchor="middle">7 categories</text>
<rect x="460.0" y="365.0" width="280" height="130" rx="4" class="box"></rect>
<text x="600.0" y="405.0" class="label-accent" text-anchor="middle">audit agents</text>
<text x="600.0" y="425.0" class="label" text-anchor="middle">up to 15 parallel</text>
<text x="600.0" y="445.0" class="label" text-anchor="middle">technical · content · schema</text>
<text x="600.0" y="465.0" class="label" text-anchor="middle">performance · geo · local</text>
<rect x="780.0" y="365.0" width="280" height="130" rx="4" class="box"></rect>
<text x="920" y="405.0" class="label-accent" text-anchor="middle">extensions</text>
<text x="920" y="425.0" class="label" text-anchor="middle">8 MCP servers</text>
<text x="920" y="445.0" class="label" text-anchor="middle">dataforseo · firecrawl</text>
<text x="920" y="465.0" class="label" text-anchor="middle">ahrefs · banana</text>
<rect x="360.0" y="610.0" width="480" height="100" rx="4" class="box"></rect>
<text x="600.0" y="655.0" class="label-accent" text-anchor="middle">thinking framework</text>
<text x="600.0" y="675.0" class="label" text-anchor="middle">perceive · analyze · validate · act</text>
<rect x="360.0" y="780.0" width="480" height="100" rx="4" class="box"></rect>
<text x="600.0" y="825.0" class="label-accent" text-anchor="middle">audit report</text>
<text x="600.0" y="845.0" class="label" text-anchor="middle">score 0-100 · action plan · pdf</text>
<path d="M 600.0 140 L 600.0 200" class="conn" marker-end="url(#arrow)"/>
<path d="M 600.0 280 L 600.0 350" class="conn-soft"/>
<path d="M 600.0 350 L 280 365" class="conn-soft"/>
<path d="M 600.0 350 L 600.0 365" class="conn-soft"/>
<path d="M 600.0 350 L 920 365" class="conn-soft"/>
<path d="M 280 495 L 280 590" class="conn-soft"/>
<path d="M 600.0 495 L 600.0 590" class="conn-soft"/>
<path d="M 920 495 L 920 590" class="conn-soft"/>
<path d="M 280 590 L 920 590" class="conn-soft"/>
<path d="M 600.0 590 L 600.0 610" class="conn" marker-end="url(#arrow)"/>
<path d="M 600.0 710 L 600.0 780" class="conn" marker-end="url(#arrow)"/>
  <text x="1180" y="938" class="corner-mark" text-anchor="end">01 · system architecture · A</text>
</g>
</svg>
