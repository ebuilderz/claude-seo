  <line x1="0" y1="48" x2="1600" y2="48" stroke="#a89968" stroke-width="1"/>
  <text x="20" y="29.0" font-family="JetBrains Mono, monospace" font-size="15" fill="#3D3933" font-weight="600">claude-seo.app — 02 · audit pipeline · B</text>
