<rect x="1030.0" y="170.0" width="400" height="100" rx="4" class="box"></rect>
<text x="1230.0" y="215.0" class="label-accent" text-anchor="middle">v3.0.0 · q4 2026</text>
<text x="1230.0" y="235.0" class="label" text-anchor="middle">audit-as-code</text>
<text x="1230.0" y="255" class="label-tiny" text-anchor="middle">CI integration</text>
<text x="1230.0" y="269" class="label-tiny" text-anchor="middle">rolling baselines</text>
  <text x="1480" y="888" class="corner-mark" text-anchor="end">05 · roadmap · C</text>
</g>
</svg>
