<text x="750.0" y="269" class="label-tiny" text-anchor="middle">web-vitals lab</text>
<rect x="1010.0" y="100" width="440" height="720" rx="8" class="box-soft"></rect>
<text x="1030.0" y="130" class="label-accent" text-anchor="start">FUTURE</text>
