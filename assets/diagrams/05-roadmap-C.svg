<text x="270.0" y="535.0" class="label-accent" text-anchor="middle">v1.9.0 · apr 2026</text>
<text x="270.0" y="555.0" class="label" text-anchor="middle">community challenge</text>
<text x="270.0" y="575" class="label-tiny" text-anchor="middle">cluster · sxo · drift</text>
<text x="270.0" y="589" class="label-tiny" text-anchor="middle">ecommerce · hreflang</text>
<rect x="70.0" y="650.0" width="400" height="100" rx="4" class="box-focal"><animate attributeName="opacity" values="0.85;1;0.85" dur="4.2s" repeatCount="indefinite"/></rect>
<text x="270.0" y="695.0" class="label-accent" text-anchor="middle">v2.0.0 · may 2026</text>
<text x="270.0" y="715.0" class="label" text-anchor="middle">AI search + framework</text>
