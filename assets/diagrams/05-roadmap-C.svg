<rect x="530.0" y="100" width="440" height="720" rx="8" class="box-soft"></rect>
<text x="550.0" y="130" class="label-accent" text-anchor="start">NEXT</text>
<text x="950.0" y="130" class="label-tiny" text-anchor="end">01</text>
